<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Map — Countries, Borders &amp; Capitals</title>
</head>
<body>
  <aside id="sidebar">
    <section class="sb-group">
      <h2 class="sb-title">Map</h2>
      <label id="name-toggle">
        <input type="checkbox" id="show-names" /> Show country names
      </label>
      <label id="cap-toggle">
        <input type="checkbox" id="show-capitals" /> Show capitals
      </label>
      <label id="flag-toggle">
        <input type="checkbox" id="show-flags" /> Show flags
      </label>
      <label id="iso-toggle">
        <input type="checkbox" id="isolate" /> Isolate selected country (hide others)
      </label>
    </section>
    <section class="sb-group sb-tabsec">
      <div class="sb-tabs">
        <button type="button" class="sb-tab active" data-tab="countries">Countries (<span id="count-num">0</span>)</button>
        <button type="button" class="sb-tab" data-tab="continents">Continents (<span id="cont-num">0</span>)</button>
      </div>
      <input id="search" type="search" placeholder="Filter countries…" autocomplete="off" />
    </section>
    <ul id="country-list"></ul>
    <ul id="continent-list" hidden></ul>
  </aside>
  <div id="map"></div>
  <div id="status">Loading world data… (detailed borders, may take a few seconds)</div>
  <div id="hoverinfo" hidden></div>
  <div id="countryinfo" hidden></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
